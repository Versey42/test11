<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    background:#0d0d1a;
    color:#fff;
    font-family:Courier;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:#111;
    padding:20px;
    width:300px;
}

input,button {
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#1a1a2e;
    border:none;
    color:#fff;
}

.error {
    color:red;
}
</style>
</head>
<body>

<div class="box">
<h3>Enter Password</h3>

<form method="POST">
<input type="password" name="password" placeholder="Password">
<button type="submit">Enter</button>
</form>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

</div>

</body>
</html>
