<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background:#0d0d1a;
    color:#c0bedd;
    font-family:Courier;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box {
    background:#111;
    padding:30px;
    width:320px;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#1a1a2e;
    border:none;
    color:#fff;
}

button { cursor:pointer; }

.error {
    color:red;
    margin-top:10px;
    text-align:center;
}
</style>

</head>
<body>

<div class="box">
    <h2>Enter Password</h2>

    <!-- 🔥 IMPORTANT: action="/" FIX -->
    <form method="POST" action="/">
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Enter</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
