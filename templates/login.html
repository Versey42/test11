<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    background:#0d0d1a;
    color:#c0bedd;
    font-family:Courier;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:#111;
    padding:30px;
    width:300px;
    text-align:center;
}

input,button {
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#1a1a2e;
    border:none;
    color:#fff;
}

button { cursor:pointer; }

.error {
    color:red;
    font-size:12px;
}
</style>
</head>
<body>

<div class="box">
    <h2>Enter Password</h2>

    <form method="POST">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Enter</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
