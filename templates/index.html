<!DOCTYPE html>
<html>
<head>
    <title>Fano's Tools</title>
</head>

<body style="font-family: Arial; background:#111; color:white; text-align:center;">

<div id="auth">
    <h1>Fano's Tools</h1>

    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>

    <p id="authMsg"></p>
</div>

<div id="app" style="display:none;">
    <h1>Fano's Tools</h1>

    <button onclick="logout()">Logout</button>

    <h3>Instant Credit</h3>
    <input id="app_token" placeholder="App Token"><br>
    <input id="event_token" placeholder="Event Token"><br>
    <input id="device_id" placeholder="Device ID"><br><br>

    <label><input type="checkbox" id="ios"> iOS</label>
    <label><input type="checkbox" id="s2s"> S2S</label><br><br>

    <button onclick="creditNow()">Credit Now</button>

    <h3>Schedule</h3>
    <input id="h" placeholder="Hours" type="number">
    <input id="m" placeholder="Minutes" type="number">
    <input id="s" placeholder="Seconds" type="number"><br><br>

    <button onclick="schedule()">Start Job</button>

    <h3>Jobs</h3>
    <div id="jobs"></div>

    <h3>Logs</h3>
    <button onclick="clearLogs()">Clear Logs</button>
    <div id="logs"></div>
</div>

<script>
function showApp() {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadJobs();
    loadLogs();
}

function showAuth() {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
}

async function login() {
    let res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        credentials: "include",
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    let data = await res.json();

    if (data.success) {
        showApp();
    } else {
        document.getElementById("authMsg").innerText = "Login failed";
    }
}

async function register() {
    let res = await fetch("/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        credentials: "include",
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    let data = await res.json();

    if (data.success) {
        document.getElementById("authMsg").innerText = "Registered! Now login.";
    } else {
        document.getElementById("authMsg").innerText = "User exists";
    }
}

function logout() {
    window.location = "/logout";
}

async function creditNow(){
    await fetch("/credit-now",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({
            app_token:app_token.value,
            event_token:event_token.value,
            device_id:device_id.value,
            is_ios:ios.checked,
            use_s2s:s2s.checked
        })
    });

    loadLogs();
}

async function schedule(){
    let seconds =
        (parseInt(h.value)||0)*3600 +
        (parseInt(m.value)||0)*60 +
        (parseInt(s.value)||0);

    await fetch("/schedule",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({
            app_token:app_token.value,
            event_token:event_token.value,
            device_id:device_id.value,
            is_ios:ios.checked,
            use_s2s:s2s.checked,
            seconds:seconds
        })
    });

    loadJobs();
}

async function loadJobs(){
    let res = await fetch("/jobs",{credentials:"include"});
    if(res.status !== 200) return showAuth();

    let data = await res.json();

    let jobsDiv = document.getElementById("jobs");
    jobsDiv.innerHTML = "";

    data.forEach(j=>{
        let div = document.createElement("div");

        function update(){
            let left = Math.floor(j.run_at - Date.now()/1000);

            if(left <= 0){
                div.innerHTML = "Running...";
            } else {
                div.innerHTML =
                    left + "s " +
                    `<button onclick="cancelJob('${j.id}')">Cancel</button>`;
            }
        }

        setInterval(update,1000);
        update();

        jobsDiv.appendChild(div);
    });
}

async function cancelJob(id){
    await fetch("/cancel",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({id})
    });

    loadJobs();
}

async function loadLogs(){
    let res = await fetch("/logs",{credentials:"include"});
    if(res.status !== 200) return;

    let data = await res.json();

    let logsDiv = document.getElementById("logs");
    logsDiv.innerHTML = "";

    data.forEach(l=>{
        logsDiv.innerHTML += `[${l.time}] ${l.msg}<br>`;
    });
}

async function clearLogs(){
    await fetch("/clear-logs",{method:"POST", credentials:"include"});
    loadLogs();
}

/* 🔥 AUTO LOGIN CHECK */
async function checkSession(){
    let res = await fetch("/jobs",{credentials:"include"});
    if(res.status === 200){
        showApp();
    } else {
        showAuth();
    }
}

checkSession();

/* AUTO REFRESH */
setInterval(loadJobs, 5000);
setInterval(loadLogs, 5000);

</script>

</body>
</html>
