<!DOCTYPE html>
<html>
<head>
    <title>Fano's Tools</title>

    <style>
        body {
            margin:0;
            font-family: Arial;
            background: #0b1a2b;
            color: white;
            text-align:center;
        }

        .box {
            background:#112b45;
            padding:20px;
            border-radius:10px;
            width:300px;
            margin:20px auto;
        }

        input {
            width:90%;
            padding:10px;
            margin:5px;
            border:none;
            border-radius:5px;
        }

        button {
            padding:10px 15px;
            margin:5px;
            border:none;
            border-radius:5px;
            background:#1e90ff;
            color:white;
            cursor:pointer;
        }

        button:hover {
            background:#3aa0ff;
        }

        #jobs div {
            background:#0e2238;
            padding:10px;
            margin:5px;
            border-radius:5px;
        }

        #logs {
            max-height:200px;
            overflow:auto;
            text-align:left;
        }
    </style>
</head>

<body>

<div id="auth" class="box">
    <h2>Fano's Tools</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>

    <p id="authMsg"></p>
</div>

<div id="app" style="display:none;">

    <div class="box">
        <h2>Fano's Tools</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="box">
        <h3>Instant Credit</h3>

        <input id="app_token" placeholder="App Token">
        <input id="event_token" placeholder="Event Token">
        <input id="device_id" placeholder="Device ID">

        <br>

        <label><input type="checkbox" id="ios"> iOS</label>
        <label><input type="checkbox" id="s2s"> S2S</label>

        <br><br>

        <button onclick="creditNow()">Credit Now</button>
    </div>

    <div class="box">
        <h3>Scheduler</h3>

        <input id="h" type="number" placeholder="Hours">
        <input id="m" type="number" placeholder="Minutes">
        <input id="s" type="number" placeholder="Seconds">

        <br><br>

        <button onclick="schedule()">Start Job</button>
    </div>

    <div class="box">
        <h3>Jobs</h3>
        <div id="jobs"></div>
    </div>

    <div class="box">
        <h3>Logs</h3>
        <button onclick="clearLogs()">Clear Logs</button>
        <div id="logs"></div>
    </div>

</div>

<script>
function showApp(){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadJobs();
    loadLogs();
}

function showAuth(){
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
}

/* 🔥 FIXED LOGIN */
async function login(){
    let res = await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({
            username:username.value,
            password:password.value
        })
    });

    let d = await res.json();

    if(d.success){
        showApp();
    }else{
        authMsg.innerText="Login failed";
    }
}

async function register(){
    let res = await fetch("/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({
            username:username.value,
            password:password.value
        })
    });

    let d = await res.json();

    if(d.success){
        authMsg.innerText="Registered! Login now.";
    }else{
        authMsg.innerText="User exists";
    }
}

function logout(){
    window.location="/logout";
}

/* -------- CORE -------- */

async function creditNow(){
    await fetch("/credit-now",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({
            app_token:app_token.value,
            event_token:event_token.value,
            device_id:device_id.value,
            is_ios:ios.checked,
            use_s2s:s2s.checked
        })
    });

    loadLogs();
}

async function schedule(){
    let seconds =
        (parseInt(h.value)||0)*3600 +
        (parseInt(m.value)||0)*60 +
        (parseInt(s.value)||0);

    await fetch("/schedule",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({
            app_token:app_token.value,
            event_token:event_token.value,
            device_id:device_id.value,
            is_ios:ios.checked,
            use_s2s:s2s.checked,
            seconds:seconds
        })
    });

    loadJobs();
}

async function loadJobs(){
    let res = await fetch("/jobs",{credentials:"include"});
    if(res.status!==200) return showAuth();

    let data = await res.json();

    jobs.innerHTML="";

    data.forEach(j=>{
        let div=document.createElement("div");

        function update(){
            let left=Math.floor(j.run_at-Date.now()/1000);

            if(left<=0){
                div.innerHTML="Running...";
            }else{
                div.innerHTML=left+"s "+
                `<button onclick="cancelJob('${j.id}')">Cancel</button>`;
            }
        }

        setInterval(update,1000);
        update();

        jobs.appendChild(div);
    });
}

async function cancelJob(id){
    await fetch("/cancel",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({id})
    });

    loadJobs();
}

async function loadLogs(){
    let res=await fetch("/logs",{credentials:"include"});
    if(res.status!==200) return;

    let data=await res.json();

    logs.innerHTML="";
    data.forEach(l=>{
        logs.innerHTML+=`[${l.time}] ${l.msg}<br>`;
    });
}

async function clearLogs(){
    await fetch("/clear-logs",{method:"POST",credentials:"include"});
    loadLogs();
}

/* 🔥 AUTO LOGIN CHECK (THIS FIXES YOUR ISSUE) */
async function checkSession(){
    let res = await fetch("/jobs",{credentials:"include"});
    if(res.status===200){
        showApp();
    }else{
        showAuth();
    }
}

checkSession();

/* refresh */
setInterval(loadJobs,5000);
setInterval(loadLogs,5000);

</script>

</body>
</html>
