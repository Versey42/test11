<!DOCTYPE html>
<html>
<head>
    <title>Fano's Tools</title>
    <style>
        body { background:#0b0b1a; color:#ccc; font-family: monospace; }
        input, button { width:100%; margin:5px 0; padding:10px; background:#1a1a2e; color:white; border:none; }
        button { cursor:pointer; }
    </style>
</head>
<body>

<h1>Fano's Tools</h1>

<div id="auth">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
    <p>Logged in | <a href="#" onclick="logout()">Logout</a></p>

    <input id="app_token" placeholder="App Token">
    <input id="event_token" placeholder="Event Token">
    <input id="device_id" placeholder="Device ID">

    <label><input type="checkbox" id="ios"> iOS</label>
    <label><input type="checkbox" id="s2s"> s2s</label>

    <button onclick="creditNow()">🔥 Credit Now</button>

    <h3>Schedule</h3>
    <input id="hours" placeholder="Hours">
    <input id="minutes" placeholder="Minutes">
    <input id="seconds" placeholder="Seconds">
    <button onclick="schedule()">Schedule</button>

    <h3>Jobs</h3>
    <div id="jobs"></div>

    <h3>Logs</h3>
    <div id="logs"></div>
</div>

<script>
const jobsDiv = document.getElementById("jobs");
const logsDiv = document.getElementById("logs");

async function register(){
    await fetch("/register", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({username:username.value,password:password.value})
    });
    alert("Registered");
}

async function login(){
    let res = await fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({username:username.value,password:password.value})
    });

    let data = await res.json();

    if(data.success){
        auth.style.display="none";
        app.style.display="block";
        load();
    }
}

function logout(){
    window.location="/logout";
}

function getData(){
    return {
        app_token:app_token.value,
        event_token:event_token.value,
        device_id:device_id.value,
        ios:document.getElementById("ios").checked,
        s2s:document.getElementById("s2s").checked
    };
}

async function creditNow(){
    let res = await fetch("/credit-now", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify(getData())
    });

    let data = await res.json();
    alert(JSON.stringify(data));
}

async function schedule(){
    let h = parseInt(hours.value||0);
    let m = parseInt(minutes.value||0);
    let s = parseInt(seconds.value||0);

    let total = h*3600 + m*60 + s;

    await fetch("/schedule", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({...getData(), seconds: total})
    });
}

async function cancel(id){
    await fetch("/cancel", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({id})
    });
}

async function load(){
    setInterval(async()=>{
        let jobs = await (await fetch("/jobs",{credentials:"include"})).json();
        jobsDiv.innerHTML = jobs.map(j=>`
            <div>
                ${new Date(j[1]*1000).toLocaleTimeString()} - ${j[2]}
                <button onclick="cancel('${j[0]}')">Cancel</button>
            </div>
        `).join("");

        let logs = await (await fetch("/logs",{credentials:"include"})).json();
        logsDiv.innerHTML = logs.map(l=>`
            <div>[${l[1]}] ${l[0]}</div>
        `).join("");
    },1000);
}
</script>

</body>
</html>
