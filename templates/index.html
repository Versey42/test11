<!DOCTYPE html>
<html>
<head>
    <title>Fano's Tools</title>
</head>
<body style="font-family: Arial; background:#111; color:white; text-align:center;">

<div id="auth">
    <h1>Fano's Tools</h1>

    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>

    <p id="auth-msg"></p>
</div>

<div id="app" style="display:none;">
    <h1>Fano's Tools</h1>

    <button onclick="logout()">Logout</button>

    <h3>Instant Credit</h3>
    <input id="app_token" placeholder="App Token"><br>
    <input id="event_token" placeholder="Event Token"><br>
    <input id="device_id" placeholder="Device ID"><br><br>

    <label><input type="checkbox" id="ios"> iOS</label>
    <label><input type="checkbox" id="s2s"> S2S</label><br><br>

    <button onclick="creditNow()">Credit Now</button>

    <h3>Schedule</h3>
    <input id="h" placeholder="Hours" type="number">
    <input id="m" placeholder="Minutes" type="number">
    <input id="s" placeholder="Seconds" type="number"><br><br>

    <button onclick="schedule()">Start Job</button>

    <h3>Jobs</h3>
    <div id="jobs"></div>

    <h3>Logs</h3>
    <button onclick="clearLogs()">Clear Logs</button>
    <div id="logs"></div>
</div>

<script>
function showApp() {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadJobs();
    loadLogs();
}

function login() {
    fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:username.value,
            password:password.value
        })
    }).then(r=>r.json()).then(d=>{
        if(d.success) showApp();
        else auth-msg.innerText="Login failed";
    });
}

function register() {
    fetch("/register", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:username.value,
            password:password.value
        })
    }).then(r=>r.json()).then(d=>{
        if(d.success) auth-msg.innerText="Registered! Now login.";
        else auth-msg.innerText="User exists";
    });
}

function logout(){
    window.location="/logout";
}

function creditNow(){
    fetch("/credit-now",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            app_token:app_token.value,
            event_token:event_token.value,
            device_id:device_id.value,
            is_ios:ios.checked,
            use_s2s:s2s.checked
        })
    }).then(()=>loadLogs());
}

function schedule(){
    let seconds =
        (parseInt(h.value)||0)*3600 +
        (parseInt(m.value)||0)*60 +
        (parseInt(s.value)||0);

    fetch("/schedule",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            app_token:app_token.value,
            event_token:event_token.value,
            device_id:device_id.value,
            is_ios:ios.checked,
            use_s2s:s2s.checked,
            seconds:seconds
        })
    }).then(()=>loadJobs());
}

function loadJobs(){
    fetch("/jobs").then(r=>r.json()).then(d=>{
        jobs.innerHTML="";

        d.forEach(j=>{
            let div=document.createElement("div");

            function update(){
                let left=Math.floor(j.run_at-Date.now()/1000);
                if(left<=0){
                    div.innerHTML="Running...";
                }else{
                    div.innerHTML=
                        left+"s "+
                        `<button onclick="cancel('${j.id}')">Cancel</button>`;
                }
            }

            setInterval(update,1000);
            update();

            jobs.appendChild(div);
        });
    });
}

function cancel(id){
    fetch("/cancel",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    }).then(()=>loadJobs());
}

function loadLogs(){
    fetch("/logs").then(r=>r.json()).then(d=>{
        logs.innerHTML="";
        d.forEach(l=>{
            logs.innerHTML+=`[${l.time}] ${l.msg}<br>`;
        });
    });
}

function clearLogs(){
    fetch("/clear-logs",{method:"POST"}).then(()=>loadLogs());
}

setInterval(loadJobs,5000);
setInterval(loadLogs,5000);
</script>

</body>
</html>
